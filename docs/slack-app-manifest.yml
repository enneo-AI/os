display_information:
  name: enneo OS
  description: Verbindet Enni read-only mit Slack-Channels und Threads.
  background_color: "#1d1e2c"
features:
  bot_user:
    display_name: Enni
    always_online: false
oauth_config:
  redirect_urls:
    - https://enneo-os-backend-production.up.railway.app/api/oauth/slack/callback
  scopes:
    bot:
      - channels:read
      - channels:history
      - channels:join
      - groups:read
      - groups:history
      - users:read
settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
